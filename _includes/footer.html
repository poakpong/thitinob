<footer class="site-footer">
  <div class="container">
    <p>&copy; {{ site.time | date: "%Y" }} {{ site.author.name }}</p>
    <p>
      {% for tag in site.tags %}
        <a class="tag-cloud" href="{{ '/tag/' | append: tag[0] | slugify | relative_url }}">{{ tag[0] }}</a>
      {% endfor %}
    </p>
  </div>
</footer>
