---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%d %B %Y" }}
      </time>
      {% if page.categories.size > 0 %}
        &nbsp;|&nbsp;
        {% for cat in page.categories %}
          <a href="{{ '/category/' | append: cat | slugify | relative_url }}">{{ cat }}</a>
        {% endfor %}
      {% endif %}
      {% if page.tags.size > 0 %}
        &nbsp;|&nbsp;
        {% for tag in page.tags %}
          <a class="tag" href="{{ '/tag/' | append: tag | slugify | relative_url }}">{{ tag }}</a>
        {% endfor %}
      {% endif %}
    </div>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
