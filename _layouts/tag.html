---
layout: default
---
<div class="tag-page">
  <h1>แท็ก: {{ page.tag }}</h1>
  {% assign tag_posts = site.tags[page.tag] %}
  {% if tag_posts %}
  <ul class="post-list">
    {% for post in tag_posts %}
    <li class="post-item">
      <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
      <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%d %B %Y" }}</time>
    </li>
    {% endfor %}
  </ul>
  {% else %}
  <p>ไม่มีบทความในแท็กนี้</p>
  {% endif %}
</div>
